<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My PDF Website</title>
    <style>
        /* Make the PDF fill the whole screen */
        body, html { margin: 0; padding: 0; height: 100%; width: 100%; overflow: hidden; background-color: #333; font-family: sans-serif; }
        iframe { width: 100%; height: 100%; border: none; }

        /* The Download Button Styling */
        .download-btn {
            position: fixed;
            bottom: 28px;
            right: 28px;
            background-color: rgba(30, 30, 30, 0.85);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            color: #e8e8e8;
            padding: 10px 18px;
            border-radius: 8px;
            text-decoration: none;
            font-size: 13px;
            font-weight: 500;
            letter-spacing: 0.02em;
            border: 1px solid rgba(255,255,255,0.1);
            box-shadow: 0 2px 12px rgba(0,0,0,0.25);
            z-index: 1000;
            display: flex;
            align-items: center;
            gap: 7px;
            opacity: 1;
            transition: opacity 0.5s ease, transform 0.2s ease, background-color 0.2s ease;
        }
        .download-btn:hover {
            background-color: rgba(50, 50, 50, 0.95);
            transform: translateY(-1px);
        }
        .download-btn.hidden {
            opacity: 0;
            pointer-events: none;
        }
    </style>
</head>
<body>
    <iframe src="document.pdf#toolbar=0" title="PDF Document">
        <p style="color: white; text-align: center; padding: 2rem;">
            Your browser can't display PDFs.
            <a href="document.pdf" style="color: #7ab8ff;">Download it instead</a>.
        </p>
    </iframe>

    <a href="document.pdf" download class="download-btn" aria-label="Download PDF">
        <!-- Download arrow icon -->
        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24"
             fill="none" stroke="currentColor" stroke-width="2.5"
             stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
            <polyline points="7 10 12 15 17 10"/>
            <line x1="12" y1="15" x2="12" y2="3"/>
        </svg>
        <span>Download PDF</span>
    </a>
    <script>
        const btn = document.querySelector('.download-btn');
        let hideTimer = setTimeout(() => btn.classList.add('hidden'), 3500);

        // Reappear briefly when mouse moves near the bottom-right corner
        document.addEventListener('mousemove', (e) => {
            const nearCorner = e.clientX > window.innerWidth - 150 && e.clientY > window.innerHeight - 150;
            if (nearCorner) {
                btn.classList.remove('hidden');
                clearTimeout(hideTimer);
                hideTimer = setTimeout(() => btn.classList.add('hidden'), 2000);
            }
        });
    </script>
</body>
</html>
